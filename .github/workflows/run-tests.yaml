name: tests

on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@5
        with:
          enable-cache: true

      - name: setup python packages
        run: uv python install 

      - name: run tests
        run: uv run pytest

